name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Clone plenary.nvim
        run: git clone --depth 1 https://github.com/nvim-lua/plenary.nvim plenary.nvim

      - name: Clone nui.nvim
        run: git clone --depth 1 https://github.com/MunifTanjim/nui.nvim nui.nvim

      - name: Run tests
        timeout-minutes: 5
        run: |
          cd nvim
          nvim --headless -u tests/minimal_init.lua -c "PlenaryBustedDirectory tests/ {minimal_init = 'tests/minimal_init.lua'}"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install selene
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SELENE_URL=$(gh api repos/Kampfkarren/selene/releases/latest \
            --jq '.assets[] | select(.name | test("^selene-[0-9].*-linux\\.zip$")) | .browser_download_url' \
            | head -1)
          curl -L "$SELENE_URL" -o selene.zip
          unzip selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/
          selene --version

      - name: Install stylua
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          STYLUA_URL=$(gh api repos/JohnnyMorganz/StyLua/releases/latest \
            --jq '.assets[] | select(.name == "stylua-linux-x86_64.zip") | .browser_download_url')
          curl -L "$STYLUA_URL" -o stylua.zip
          unzip stylua.zip
          chmod +x stylua
          sudo mv stylua /usr/local/bin/
          stylua --version

      - name: Run selene
        run: selene nvim/lua/ nvim/init.lua

      - name: Check formatting
        run: stylua --check nvim/lua/ nvim/init.lua
